name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Typecheck, lint, validate data, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Non-blocking: the codebase currently carries pre-existing lint debt
      # (react-hooks/set-state-in-effect and no-explicit-any violations
      # predating this workflow) that would otherwise make this step red
      # from day one on every PR, training people to ignore CI rather than
      # catching real regressions. Remove continue-on-error once that debt
      # is paid down and this can be a real gate.
      - name: Lint (non-blocking until pre-existing debt is cleared)
        run: npm run lint
        continue-on-error: true

      - name: Validate lesson data
        run: npm run data:validate-lessons

      - name: Validate i18n message parity
        run: npm run data:validate-i18n

      - name: Build
        run: npm run build

  e2e:
    name: Playwright (a11y + admin auth gating)
    runs-on: ubuntu-latest
    # middleware.ts runs on every route (including the public pages these
    # tests cover) and refreshes the Supabase session on each request, so
    # the dev server needs *some* well-formed Supabase URL/key to boot even
    # though these tests never sign in or touch real data — no session
    # cookie means supabase-js's getUser() resolves to null locally without
    # a network round-trip. Placeholder values are enough; nothing here
    # requires real project secrets. e2e/admin-auth.spec.ts covers only
    # what's verifiable without a real session (every admin route/API
    # endpoint correctly refuses an unauthenticated visitor) — testing
    # actual authenticated CRUD and role-escalation rejection needs a real
    # Supabase test project with seeded accounts, which isn't set up here.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

  db-migrations:
    name: Migrations apply cleanly
    runs-on: ubuntu-latest
    # Verifies every file in supabase/migrations/*.sql still applies, in
    # order, against a real local Supabase stack — not a vanilla Postgres
    # container, since profiles/storage policies reference auth.users and
    # storage.objects, which only exist under the Supabase CLI's stack.
    # Only db/auth/rest/kong are started (--exclude everything else) since
    # this job only needs a working Postgres + migration runner, not
    # Studio/Storage/Edge Functions/etc — verified locally that excluding
    # them doesn't affect whether migrations apply.
    #
    # This job caught a real bug on its first real run: 0006_super_admin.sql
    # added an enum value with `alter type app_role add value` and used
    # that same value later in the same file — Postgres rejects using a
    # newly-added enum value before the transaction that added it commits,
    # so the migration failed outright. Fixed with an explicit `commit;`
    # mid-file (see that migration's comments).
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack (applies every migration in order)
        run: supabase start --exclude edge-runtime,imgproxy,logflare,mailpit,postgres-meta,realtime,storage-api,studio,supavisor,vector
